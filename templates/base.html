<!doctype html>
<html lang="en-us">

<head>
  <meta charset="UTF-8" />
  <title>Spack Build Cache</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="//unpkg.com/alpinejs" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css?family=Source+Code+Pro:300,400" rel="stylesheet" />
  <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Source+Sans+Pro:300,300i,600" />

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ base_path }}/static/style.css" />
  <link rel="shortcut icon" type="image/x-icon" href="{{ base_path }}/favicon.ico" />

  <!-- https://datatables.net/download/ -->
  <!-- Includes DataTables default styling, jQuery, and the FixedHeader extension-->
  <link href="https://cdn.datatables.net/v/dt/jq-3.7.0/dt-2.3.7/fh-4.0.6/datatables.min.css" rel="stylesheet"
    integrity="sha384-yJrobgt0wFqSJNdxOFcBbOXNpr8I/uFjwZ44/196NWd7rHSf7GYycUBGhz33pyUd" crossorigin="anonymous">
  <script src="https://cdn.datatables.net/v/dt/jq-3.7.0/dt-2.3.7/fh-4.0.6/datatables.min.js"
    integrity="sha384-/YuHOFVXnW0bJqgpLdERyNItcLG4UoQuEXmtCKesNfWDsKuCOQUMYbfaJ+gkmutf"
    crossorigin="anonymous"></script>
</head>

<a id="base-path" style="display: none">{{base_path}}</a>

<body class="bg-gray-100">
  {% include "treeview.html" %}
  <div class="container shifted" id="content-container">
    <div class="py-8 pb-24">{% block content %} {% endblock %}</div>
    {% include "footer.html" %}
  </div>
</body>

</html>

<script>
  let tagName = undefined;
  let stackName = undefined;
  let packageName = undefined;

  function applyRoute() {
    let path = window.location.pathname.slice(1).split('/')
    const basePath = document.getElementById('base-path').innerHTML
    if (basePath) {
      path = path.filter((fragment) => !basePath.includes(fragment))
    }
    if (path.length == 2 && path[0] == 'tag') {
      tagName = path[1]
    }

    if (path.length == 4 && path[0] == 'package') {
      tagName = path[1]
      packageName = path[2]
    }

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("stack")) {
      stackName = urlParams.get("stack");
      setText("stack-name", stackName);
    }

    if (tagName) {
      setText('tag-name', tagName)
      setText(
        'mirror-code',
        `spack mirror add ${tagName}${stackName ? '-' + stackName : ''} https://binaries.spack.io/${tagName}${stackName ? '/' + stackName : ''}`,
      )
    }
  }

  function toggleMenu(menuId) {
    const menu = document.getElementById(menuId);
    if (menu.style.display === "block") {
      menu.style.display = "none";
    } else {
      menu.style.display = "block";
    }
  }

  function setText(className, text) {
    Array.from(document.getElementsByClassName(className)).forEach(
      (elem) => (elem.innerHTML = text),
    );
  }
</script>
