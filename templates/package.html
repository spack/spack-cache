{% extends 'base.html' %} {% block content %}

<div class="alert bg-primary text-white">
    <h1 id="package-name">{{ package.uid }}</h1>
    <div class="flex-none pr-5">
        <div class="tooltip tooltip-bottom" data-tip="View on Spack Packages">
            <a href="https://packages.spack.io/package.html?name={{ package.uid }}"
                class="btn btn-ghost btn-square rounded-btn" target="_blank" alt="Spack Packages">
                <i class="ri-box-3-line text-xl"></i>
            </a>
        </div>
    </div>
</div>

<div style="display: block;">
    This package has
    <strong class="px-1">{{ package.num_specs }}</strong>
    spec(s) in the build cache.
    <span id="stack-filter-banner" style="display:none">
        <strong class="stack-num-specs px-1"></strong>
        spec(s) exist for stack
        <strong class="stack-name pl-1"></strong>.
    </span>
</div>

<div class="container">
    <div class="table-controls">
        <div class="form-control">
            <input id="table-filter" type="search" class="form-control input-sm input border-base-300"
                oninput="updateTable()">
            <label class="label floating">
                <span class="label-text-alt text-gray-400 text-[10px]">Filter</span>
            </label>
        </div>

        <div id="badge-filters"></div>

        <div id="result-summary"></div>
    </div>

    <table id="cache" class="table w-full">
        <thead>
            <tr>
                <th>Hash</th>
                <th>Version</th>
                <th>Variants</th>
                <th>Dependencies</th>
                <th>Platform</th>
                <th>OS</th>
                <th>Target</th>
            </tr>
        </thead>
    </table>
</div>

<div id="specs-data" style="display: none">{{ specs | tojson }}</div>

<script>
    let originalData = null;
    const badgeFilters = {
        version: [],
        variant: [],
        platform: [],
        os: [],
        target: [],
    };
    const maxBadges = 3;

    function addBadgeFilter(column, label) {
        if (!badgeFilters[column].includes(label)) {
            badgeFilters[column].push(label);
            const container = document.getElementById('badge-filters');
            const badge = document.createElement('button');
            badge.id = `badge-filter-${column}-${label}`;
            badge.classList.add('tag', 'searchable-badge');
            badge.innerHTML = label + '  X';
            badge.onclick = () => removeBadgeFilter(column, label)
            container.appendChild(badge);
            updateTable();
        }
    }

    function removeBadgeFilter(column, label) {
        badgeFilters[column] = badgeFilters[column].filter((l) => l !== label)
        const badge = document.getElementById(`badge-filter-${column}-${label}`);
        const container = document.getElementById('badge-filters');
        container.removeChild(badge);
        updateTable();
    }


    function groupBadges(column, data, link = false) {
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.flexWrap = 'wrap';
        data.forEach((d, i) => {
            let badge = null
            if (link) {
                badge = document.createElement('a')
                badge.style.textDecoration = 'underline';
                badge.classList.add('pl-2')
                badge.href = d.link;
                badge.innerHTML = d.label;
            } else {
                badge = document.createElement('button');
                badge.classList.add('tag', 'searchable-badge');
                badge.onclick = () => addBadgeFilter(column, d);
                badge.innerHTML = d;
            }
            if (i >= maxBadges) {
                badge.classList.add('hidden')
            }
            container.appendChild(badge)
        });
        if (data.length > maxBadges) {
            const showMore = document.createElement('button');
            showMore.classList.add('btn', 'btn-xs', 'btn-ghost', 'normal-case', 'pl-2')
            showMore.innerHTML = `... Show ${data.length - maxBadges} More`;
            showMore.onclick = (e) => showMoreBadges(e, data.length - maxBadges)
            container.appendChild(showMore)
        }
        return container;
    }

    function showMoreBadges(e, n) {
        const target = e.target
        $(target).parent().find('.hidden').toggle();
        $(target).text(function (i, text) {
            const showMoreText = `... Show ${n} More`
            return text === showMoreText ? "Show Less" : showMoreText;
        })
    }

    function setupDataTable() {
        $('#cache').DataTable({
            ordering: false,
            layout: {
                topStart: null,
                topEnd: null,
                bottom: 'paging',
                bottomStart: null,
                bottomEnd: null
            },
            language: {
                search: "Filter: ",
            },
            pageLength: 25,
            columns: [
                {
                    data: 'hash',
                    render: function (data, type, row) {
                        return '<span class="font-mono">' + data + '</span>';
                    },
                },
                {
                    data: 'versions',
                    render: function (data, type, row) {
                        return groupBadges('version', data);
                    }
                },
                {
                    data: 'variants',
                    render: function (data, type, row) {
                        return groupBadges('variant', data);
                    },
                },
                {
                    data: 'dependencies',
                    render: function (data, type, row) {
                        return groupBadges('dependency', data, true);
                    },
                },
                {
                    data: 'platform',
                    render: function (data, type, row) {
                        return groupBadges('platform', [data]);
                    },
                },
                {
                    data: 'os',
                    render: function (data, type, row) {
                        return groupBadges('os', [data]);
                    },
                },
                {
                    data: 'target',
                    render: function (data, type, row) {
                        return groupBadges('target', [data]);
                    },
                },
            ],
        });
    }

    function updateTable() {
        let table = $('#cache').DataTable();
        const filter = document.getElementById('table-filter');
        const badgeFilteredData = originalData.filter((d) => {
            for (const column in badgeFilters) {
                const labels = badgeFilters[column]
                for (let i = 0; i < labels.length; i++) {
                    const value = labels[i];
                    if (d[column] && !JSON.stringify(d[column]).includes(value)) {
                        return false;
                    }
                }
            }
            return true;
        })
        table.clear().rows.add(badgeFilteredData).search(filter.value).draw();
        var count = table.rows({ search: 'applied' }).count();
        const resultSummary = document.getElementById('result-summary');
        resultSummary.innerHTML = `Showing ${count} of ${originalData.length} Results`;
    }

    $(document).ready(function () {
        applyRoute();
        setupDataTable();

        let data = JSON.parse(document.getElementById('specs-data').innerHTML)

        if (stackName) {
            // filter by stack
            data = data.filter((value) => value['stack'] === stackName)
            setText('stack-num-specs', data.length)
            document.getElementById('stack-filter-banner').style.display = 'inline'
        }
        originalData = data;
        updateTable();
    });
</script>

{% endblock %}
