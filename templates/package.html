{% block content %}
<div class="bg-surface-elevated px-6 py-4">
    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-2xl font-semibold tracking-tight package-name"></h1>
            <p class="mt-0.5 text-sm text-muted-foreground">
                Showing <span class="num-table-rows">...</span> of <span class="num-specs">...</span> builds across all releases
            </p>
        </div>
        <button onclick="toggleInstallDialogShown(undefined)" class="inline-flex items-center gap-1.5 rounded-md bg-primary px-3 py-1.5 text-xs font-medium text-primary-foreground shadow-sm hover:bg-primary/90">
            {{ install_icon() }}
            How to install <span class="package-name"></span>
        </button>
    </div>

    <div class="mt-3 flex flex-wrap items-center gap-x-3 gap-y-2 rounded-lg border border-border bg-surface px-3 py-2 shadow-sm">
        <span class="text-xs font-medium uppercase tracking-wider text-muted-foreground">
            Filters:
        </span>
        <div class="relative" onclick="event.stopPropagation()">
            <button onclick="setBadgeOptionsMenuVisible(true)" class="inline-flex items-center gap-1.5 rounded-md border border-border bg-background px-2.5 py-1 text-xs text-muted-foreground hover:text-foreground">
                {{ plus_icon() }}
                Add filter
            </button>
            <div id="badge-options-menu" class="hidden absolute left-0 top-full z-20 mt-1 w-80 overflow-hidden rounded-md border border-border bg-surface-elevated shadow-lg">
                <div class="flex items-center gap-2 border-b border-border px-2 py-1.5">
                    {{ mini_search_icon() }}
                    <input id="badge-options-filter" type="search" oninput="filterBadgeOptions()" placeholder="Filter attributes..." class="flex-1 bg-transparent text-sm outline-none placeholder:text-muted-foreground">
                </div>
                <div class="max-h-72 overflow-auto">
                    <div id="badge-options-list" class="pb-1"></div>
                </div>
            </div>
        </div>
        <div id="badge-filters" class="inline-flex flex-wrap items-center gap-1.5"></div>
        <div class="ml-auto flex items-center gap-1.5">
            <div class="relative" onclick="event.stopPropagation()">
                <button onclick="setColumnsMenuVisible(true)" class="inline-flex items-center gap-1.5 rounded-md border px-2.5 py-1 text-xs transition-colors border-border bg-background text-muted-foreground hover:text-foreground">
                    {{ cols_icon() }}
                    Columns
                </button>
                <div id="columns-menu-wrapper" class="hidden absolute right-0 top-full z-20 mt-1 w-56 overflow-hidden rounded-md border border-border bg-surface-elevated shadow-lg">
                    <div class="flex items-center justify-between border-b border-border px-3 py-1.5">
                        <span class="text-[10px] uppercase tracking-wider text-muted-foreground">
                            Visible columns
                        </span>
                    </div>
                    <div id="columns-menu" class="max-h-72 overflow-auto py-1"></div>
                </div>
            </div>
            <button id="diff-mode-button" onclick="toggleDiffMode()" class="inline-flex items-center gap-1.5 rounded-md border px-2.5 py-1 text-xs transition-colors border-border bg-background text-muted-foreground hover:text-foreground">
                {{ eye_icon() }}
                <span>Hide common values</span>
            </button>
        </div>
    </div>
</div>
<table id="cache" class="table w-full">
    <thead>
        <tr>
            <th>Hash</th>
            <th>Version</th>
            <th>Releases</th>
            <th>Stacks</th>
            <th>Variants</th>
            <th>Platform</th>
            <th>OS</th>
            <th>Target</th>
            <th>Dependencies</th>
        </tr>
    </thead>
</table>
{% endblock %}
